[package]
name = "boringtun"
version = "0.7.0"
edition = "2018"
license = "BSD-3-Clause"
authors = [
    "Noah Kennedy <nkennedy@cloudflare.com>",
    "Andy Grover <agrover@cloudflare.com>",
    "Jeff Hiner <jhiner@cloudflare.com>",
]
description = "Rustynet-local fork of boringtun with a noise-only dependency surface"
documentation = "https://docs.rs/boringtun/0.7.0/boringtun/"
readme = "README.md"
repository = "https://github.com/cloudflare/boringtun"
autobins = false
autoexamples = false
autotests = false
autobenches = false

[features]
default = []
mock-instant = []

[lib]
name = "boringtun"
crate-type = ["rlib"]
path = "src/lib.rs"

[dependencies]
aead = "0.5.0-pre.2"
base64 = "0.13"
blake2 = "0.10"
chacha20poly1305 = "0.10.0-pre.1"
hex = "0.4"
hmac = "0.12"
nix = { version = "0.25", features = ["time"], default-features = false }
parking_lot = "0.12"
rand_core = { version = "0.6.4", features = ["getrandom"] }
subtle = "2.6"
tracing = "0.1.40"
x25519-dalek = { version = "2.0.1", features = ["reusable_secrets", "static_secrets"] }
