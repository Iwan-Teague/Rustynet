\* TLC model configuration for MembershipTrustState.tla — CORRECT reducer.
\* To reproduce the RSA-0009 counterexample, set BuggyReducer = TRUE:
\* TLC then violates InvHonestNeverRootMismatch on a Mint -> Tick -> Apply
\* trace through any stamping arm (setcaps/revoke/restore/rotatekey).
\*
\* Run:  java -cp tla2tools.jar tlc2.TLC -config MembershipTrustState.cfg \
\*            MembershipTrustState.tla
SPECIFICATION Spec
CONSTANTS
  NodeIds   = {"a", "b"}
  Keys      = {"k1", "k2"}
  Caps      = {"c1"}
  UpdateIds = {"u1", "u2"}
  MaxTime   = 3
  MaxEpoch  = 2
  ClockSkew = 1
  UpdateTtl = 2
  BuggyReducer = FALSE
INVARIANTS
  InvLogEpochsChain
  InvNoDoubleAccept
  InvHonestNeverRootMismatch
  InvNoForkPerRoot
  InvCacheCoupling
PROPERTIES
  RejectLeavesCacheIntact
  EpochNeverDecreases
