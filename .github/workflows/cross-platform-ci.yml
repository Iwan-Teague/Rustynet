name: Cross Platform CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  macos:
    name: macOS build+security
    runs-on: macos-14
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Bootstrap CI tools
        run: |
          RUSTYNET_CI_BOOTSTRAP_SYSTEM=0 ./scripts/ci/bootstrap_ci_tools.sh
      - name: Workspace validation
        # clippy is the single compile-correctness + lint pass: it is rustc
        # plus lint passes, so a separate `cargo check` here was a pure
        # duplicate full compile (no shared incremental cache across the
        # clippy wrapper).
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
          # cargo-nextest (pinned via bootstrap_ci_tools, BLD-2) schedules the
          # workspace's ~100 test binaries against one concurrent pool instead
          # of cargo test's one-binary-at-a-time run. `cargo test --workspace
          # --all-targets --all-features` remains the authoritative gate
          # definition; --retries 0 (the default) is explicit so retries can
          # never silently mask a flaky test.
          cargo nextest run --workspace --all-targets --all-features --locked --retries 0
      - name: Lab monitor standalone gates
        # rustynet-lab-monitor is EXCLUDED from the workspace (see root
        # Cargo.toml + crate README), so the workspace validation above never
        # touches it. Gate the excluded crate explicitly here. It is
        # macOS/Linux only, so it runs on this leg and the Debian leg, not
        # the Windows leg.
        run: |
          ./scripts/ci/lab_monitor_gates.sh
      - name: Security gates
        run: |
          cargo audit --deny warnings
          cargo deny check bans licenses sources advisories

  debian13:
    name: Debian 13 build+security
    runs-on: ubuntu-latest
    container:
      image: debian:trixie
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Bootstrap CI tools
        run: |
          ./scripts/ci/bootstrap_ci_tools.sh
      - name: Workspace validation
        # clippy is the single compile-correctness + lint pass (see the
        # macOS leg's note); no separate `cargo check` duplicate.
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
          # nextest as the runner, cargo test as the authoritative definition —
          # see the macOS leg's comment (BLD-2).
          cargo nextest run --workspace --all-targets --all-features --locked --retries 0
      - name: Lab monitor standalone gates
        # Excluded from the workspace; gate it explicitly on the Linux leg
        # too (macOS/Linux only crate). See scripts/ci/lab_monitor_gates.sh.
        run: |
          ./scripts/ci/lab_monitor_gates.sh
      - name: Security gates
        run: |
          cargo audit --deny warnings
          cargo deny check bans licenses sources advisories

  linux_e2e:
    name: Linux real WireGuard E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Bootstrap CI tools
        run: |
          ./scripts/ci/bootstrap_ci_tools.sh
      - name: Run real dataplane E2E harness
        run: |
          sudo -E ./scripts/e2e/real_wireguard_exitnode_e2e.sh

  windows:
    name: Windows build+security (rustynetd + windows-native)
    runs-on: windows-2022
    # Scope: this job exercises the Windows-portable crates that
    # carry the W1.x / W2.x / W4.x Windows verifier surface (the
    # SCM API bindings + DPAPI / SDDL / named-pipe / WinVerifyTrust
    # FFI in rustynet-windows-native, the `windows-…-check`
    # subcommands in rustynetd). The orchestrator crate
    # (rustynet-cli) deliberately ships unix-only modules
    # (ops_install_systemd, ops_phase9) at top level and therefore
    # cannot build on Windows; cross-target check from the macOS +
    # Debian jobs above already covers rustynet-cli's wire-format
    # compatibility with the Windows daemon.
    defaults:
      run:
        # Use Git Bash (pre-installed on windows-2022 runners) so
        # the cargo invocations match the macOS / Debian jobs above.
        shell: bash
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Pin toolchain + install cargo-audit / cargo-deny / cargo-nextest
        run: |
          # The bash bootstrap wrapper invokes `cargo run -p
          # rustynet-cli --bin bootstrap_ci_tools`; rustynet-cli
          # does not build on Windows so we cannot use the wrapper
          # here. Pin the same versions inline, mirroring the
          # bootstrap binary's contract (PINNED_TOOLCHAIN=1.85.0,
          # security toolchain=1.88.0, cargo-audit=0.22.1,
          # cargo-deny=0.19.1, cargo-nextest=0.9.114). nextest's
          # MSRV is 1.88, above this leg's 1.85.0 default, so it
          # installs via the 1.88.0 toolchain like the bootstrap
          # binary does.
          rustup toolchain install 1.85.0 --profile minimal --component rustfmt --component clippy
          rustup default 1.85.0
          rustup toolchain install 1.88.0 --profile minimal
          cargo install cargo-audit --locked --version 0.22.1 --force
          cargo install cargo-deny --locked --version 0.19.1 --force
          cargo +1.88.0 install cargo-nextest --locked --version 0.9.114 --force
      - name: Build + test Windows-portable crates
        run: |
          # Crate selection is intentional. rustynetd carries every
          # Windows-side validator (windows_paths,
          # windows_authenticode, windows_dns_failclosed,
          # windows_key_custody, windows_mesh_status,
          # windows_runtime_boundary, windows_service,
          # windows_service_hardening, windows_ipc, etc.).
          # rustynet-windows-native carries the FFI wrappers (DPAPI,
          # SDDL, named-pipe, WinVerifyTrust). The remaining crates
          # are the protocol-agnostic primitives the Windows daemon
          # links against; building them here exercises both
          # platform-conditional cfg paths AND any unix-only
          # regression that would slip past the Linux-side jobs.
          PKGS=(
            -p rustynetd
            -p rustynet-windows-native
            -p rustynet-crypto
            -p rustynet-policy
            -p rustynet-dns-zone
            -p rustynet-control
            -p rustynet-backend-api
            -p rustynet-backend-stub
            -p rustynet-relay
            -p rustynet-local-security
          )
          cargo fmt "${PKGS[@]}" -- --check
          # clippy doubles as the compile-correctness gate (rustc plus lint
          # passes); a separate `cargo check` of the same package set was a
          # pure duplicate compile.
          cargo clippy "${PKGS[@]}" --all-targets --all-features --locked -- -D warnings
          # --no-fail-fast: run EVERY test even after one fails, so a single
          # run surfaces the complete Windows failure set instead of stopping
          # at the first failure (Windows tests cannot be run locally on the
          # macOS lab host, so each masked failure would otherwise cost a full
          # ~12-min CI round-trip to discover). nextest is the runner (BLD-2);
          # `cargo test` remains the authoritative gate definition, and
          # --retries 0 keeps flaky-test retries structurally off.
          cargo nextest run "${PKGS[@]}" --all-targets --all-features --locked --no-fail-fast --retries 0
      - name: Security gates
        run: |
          # Check out the cargo-audit / cargo-deny advisory-db clones with LF.
          # Git-for-Windows defaults to autocrlf=true, which rewrites the
          # RustSec advisory `.md` files with CRLF on clone; the advisory
          # parser then fails ("failed to find toml block" parsing e.g.
          # abi_stable/RUSTSEC-2020-0105.md) before it can scan our deps. This
          # is a checkout-encoding issue in the advisory database, not a real
          # advisory/ban in the workspace. Pinning autocrlf=false makes the
          # freshly-cloned advisory-db parse identically to Linux/macOS.
          git config --global core.autocrlf false
          # cargo-audit + cargo-deny operate on Cargo.lock + the
          # workspace manifest, so they validate the whole
          # dependency surface (including rustynet-cli's deps) even
          # though we only built the Windows-portable subset above.
          cargo audit --deny warnings
          cargo deny check bans licenses sources advisories
