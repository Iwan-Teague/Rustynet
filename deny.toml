[advisories]
version = 2

[bans]
multiple-versions = "warn"
wildcards = "allow"

# Deprecated cryptographic algorithms (G2 — removal scheduled 2026-06-01)
[[bans.deny]]
name = "sha1"
wrappers = []

[[bans.deny]]
name = "md-5"
wrappers = []

# `md5` is a separate, standalone crates.io package (stainless-steel/md5,
# 115M+ downloads) — distinct from the RustCrypto `md-5` crate banned
# above. The G2c source-scan grep in scripts/ci/security_regression_gates.sh
# already rejects `use md5;` import statements, but without this deny
# entry a contributor could add `md5 = "0.8"` to a Cargo.toml without
# tripping `cargo deny check bans`. Deny both names for parity with the
# G2c grep coverage.
[[bans.deny]]
name = "md5"
wrappers = []

[[bans.deny]]
name = "des"
wrappers = []

[[bans.deny]]
name = "3des"
wrappers = []

[[bans.deny]]
name = "des3"
wrappers = []

# Additional deprecated cryptographic algorithms — RC4 has practical
# bias / recovery attacks (RC4 NOMORE, Bar-Mitzvah); RFC 7465
# prohibits it in TLS. MD4 has practical collisions (Wang 2005).
# MD2 has practical preimage attacks (RFC 6149 historic). The X3
# `scan_source_for_deprecated_crypto_imports` audit gates the
# Rust source-import side; this deny entry gates Cargo.toml.
[[bans.deny]]
name = "rc4"
wrappers = []

[[bans.deny]]
name = "md4"
wrappers = []

[[bans.deny]]
name = "md2"
wrappers = []

[licenses]
confidence-threshold = 0.8
allow = [
  "MIT",
  "Apache-2.0",
  "Unicode-3.0",
  "BSD-3-Clause",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
