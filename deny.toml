[advisories]
version = 2

[bans]
multiple-versions = "warn"
wildcards = "allow"

# Deprecated cryptographic algorithms (G2 — removal scheduled 2026-06-01)
[[bans.deny]]
name = "sha1"
wrappers = []

[[bans.deny]]
name = "md-5"
wrappers = []

[[bans.deny]]
name = "des"
wrappers = []

[[bans.deny]]
name = "3des"
wrappers = []

[[bans.deny]]
name = "des3"
wrappers = []

[licenses]
confidence-threshold = 0.8
allow = [
  "MIT",
  "Apache-2.0",
  "Unicode-3.0",
  "BSD-3-Clause",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
