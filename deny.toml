[advisories]
version = 2

[bans]
multiple-versions = "warn"
wildcards = "allow"

# Deprecated cryptographic algorithms (G2 — removal scheduled 2026-06-01)
[[bans.deny]]
name = "sha1"
wrappers = []

[[bans.deny]]
name = "md-5"
wrappers = []

# `md5` is a separate, standalone crates.io package (stainless-steel/md5,
# 115M+ downloads) — distinct from the RustCrypto `md-5` crate banned
# above. The G2c source-scan grep in scripts/ci/security_regression_gates.sh
# already rejects `use md5;` import statements, but without this deny
# entry a contributor could add `md5 = "0.8"` to a Cargo.toml without
# tripping `cargo deny check bans`. Deny both names for parity with the
# G2c grep coverage.
[[bans.deny]]
name = "md5"
wrappers = []

[[bans.deny]]
name = "des"
wrappers = []

[[bans.deny]]
name = "3des"
wrappers = []

[[bans.deny]]
name = "des3"
wrappers = []

# Additional deprecated cryptographic algorithms — RC4 has practical
# bias / recovery attacks (RC4 NOMORE, Bar-Mitzvah); RFC 7465
# prohibits it in TLS. MD4 has practical collisions (Wang 2005).
# MD2 has practical preimage attacks (RFC 6149 historic). The X3
# `scan_source_for_deprecated_crypto_imports` audit gates the
# Rust source-import side; this deny entry gates Cargo.toml.
[[bans.deny]]
name = "rc4"
wrappers = []

[[bans.deny]]
name = "md4"
wrappers = []

[[bans.deny]]
name = "md2"
wrappers = []

# RC2 — 64-bit-block cipher with practical related-key attacks
# (Knudsen 1997); RFC 8407 historic. Blowfish — 64-bit-block →
# sweet32-class birthday attacks after ~32 GiB ciphertext
# (CVE-2016-2183). Modern protocols use 128-bit-block ciphers.
[[bans.deny]]
name = "rc2"
wrappers = []

[[bans.deny]]
name = "blowfish"
wrappers = []

[licenses]
confidence-threshold = 0.8
allow = [
  # Rustynet's own (first-party) source-available license, applied to the
  # workspace crates via [workspace.package] license. Third-party dependencies
  # must still be one of the permissive licenses listed below. See ./LICENSE.
  "PolyForm-Noncommercial-1.0.0",
  "MIT",
  "Apache-2.0",
  "Unicode-3.0",
  "BSD-3-Clause",
  # Permissive (non-copyleft) licenses required by the rustls-based HTTPS stack
  # that the rustynet-mcp-deepseek dev tool uses to reach the DeepSeek API:
  #   ISC                  -> ring, rustls, rustls-webpki, untrusted
  #   CDLA-Permissive-2.0  -> webpki-roots (Mozilla CA root bundle)
  "ISC",
  "CDLA-Permissive-2.0",
  # Blocked: MPL-2.0 is copyleft (RN-15).
  # "MPL-2.0",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
